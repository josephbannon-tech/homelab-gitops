apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: media-scanner-rbac
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/josephbannon-tech/homelab-gitops.git
    targetRevision: HEAD
    path: charts/media-scanner-rbac
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
