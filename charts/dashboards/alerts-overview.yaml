apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-alerts-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  alerts-overview.json: |
    {
      "title": "Alerts \u2014 Fleet Overview",
      "uid": "alerts-overview",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timezone": "Europe/London",
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "refresh": 1
          }
        ]
      },
      "panels": [
        {
          "id": 900,
          "title": "Active alerts",
          "type": "row",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 901,
          "title": "Critical firing",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 0,
            "y": 1,
            "w": 8,
            "h": 5
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "count(ALERTS{alertstate=\"firing\",severity=\"critical\"}) or vector(0)",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 902,
          "title": "Warning firing",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 8,
            "y": 1,
            "w": 8,
            "h": 5
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "count(ALERTS{alertstate=\"firing\",severity=\"warning\"}) or vector(0)",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 903,
          "title": "Total firing",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 16,
            "y": 1,
            "w": 8,
            "h": 5
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "count(ALERTS{alertstate=\"firing\"}) or vector(0)",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 904,
          "title": "All firing alerts",
          "type": "table",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 0,
            "y": 6,
            "w": 24,
            "h": 10
          },
          "options": {
            "showHeader": true,
            "sortBy": [
              {
                "displayName": "Severity",
                "desc": false
              }
            ]
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "ALERTS{alertstate=\"firing\"}",
              "instant": true,
              "format": "table",
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "Value": true,
                  "alertstate": true,
                  "namespace": true,
                  "prometheus": true,
                  "job": true,
                  "endpoint": true,
                  "container": true,
                  "pod": true,
                  "hostname": true,
                  "device": true,
                  "mountpoint": true,
                  "attribute_name": true,
                  "attribute_value_type": true,
                  "fstype": true,
                  "zpool": true,
                  "model_name": true,
                  "state": true,
                  "name": true
                },
                "renameByName": {
                  "alertname": "Alert",
                  "severity": "Severity",
                  "service": "Service",
                  "instance": "Host"
                },
                "indexByName": {
                  "alertname": 0,
                  "severity": 1,
                  "service": 2,
                  "instance": 3
                }
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "filterable": true
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Severity"
                },
                "properties": [
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "type": "color-text"
                    }
                  },
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "type": "value",
                        "options": {
                          "critical": {
                            "color": "red",
                            "text": "CRITICAL",
                            "index": 0
                          },
                          "warning": {
                            "color": "orange",
                            "text": "WARNING",
                            "index": 1
                          }
                        }
                      }
                    ]
                  }
                ]
              }
            ]
          }
        },
        {
          "id": 905,
          "title": "History",
          "type": "row",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 16,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 906,
          "title": "Firing alerts by severity",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 0,
            "y": 17,
            "w": 24,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "count by (severity) (ALERTS{alertstate=\"firing\"})",
              "legendFormat": "{{severity}}",
              "refId": "A"
            }
          ]
        }
      ],
      "links": []
    }
