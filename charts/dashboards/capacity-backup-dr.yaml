apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-capacity-backup-dr
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  capacity-backup-dr.json: |
    {
      "title": "Capacity, Growth & Backup/DR",
      "uid": "capacity-backup-dr",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timezone": "Europe/London",
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "refresh": 1
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Filesystem Free Space (%)",
          "type": "row",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 2,
          "title": "Free %",
          "type": "bargauge",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 0,
            "y": 1,
            "w": 24,
            "h": 8
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "orientation": "horizontal",
            "displayMode": "gradient",
            "valueMode": "color"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "mappings": [],
              "thresholds": {
                "mode": "percentage",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 70
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "100 * node_filesystem_avail_bytes{fstype!~\"tmpfs|overlay|squashfs|devtmpfs\"} / node_filesystem_size_bytes{fstype!~\"tmpfs|overlay|squashfs|devtmpfs\"}",
              "legendFormat": "{{hostname}} {{mountpoint}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "ZFS Pool Used vs Capacity (NAS)",
          "type": "row",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 9,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 4,
          "title": "Pool Used %",
          "type": "bargauge",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 0,
            "y": 10,
            "w": 12,
            "h": 6
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "orientation": "horizontal",
            "displayMode": "gradient",
            "valueMode": "color"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "mappings": [],
              "thresholds": {
                "mode": "percentage",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 70
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "100 * (node_zfs_zpool_size{hostname=\"JBNAS01\"} - node_zfs_zpool_free{hostname=\"JBNAS01\"}) / node_zfs_zpool_size{hostname=\"JBNAS01\"}",
              "legendFormat": "{{zpool}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "title": "Pool free total",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 12,
            "y": 10,
            "w": 6,
            "h": 6
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum(node_zfs_zpool_free{hostname=\"JBNAS01\"})",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "title": "Pool size total",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 18,
            "y": 10,
            "w": 6,
            "h": 6
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "text",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum(node_zfs_zpool_size{hostname=\"JBNAS01\"})",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 7,
          "title": "Pool Used Trend (30d)",
          "type": "row",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 16,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 8,
          "title": "ZFS pool used bytes",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 0,
            "y": 17,
            "w": 24,
            "h": 9
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "node_zfs_zpool_size{hostname=\"JBNAS01\"} - node_zfs_zpool_free{hostname=\"JBNAS01\"}",
              "legendFormat": "{{zpool}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 9,
          "title": "Estate Headroom \u2014 RAM & CPU per Host",
          "type": "row",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 26,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 10,
          "title": "Free memory (%)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 0,
            "y": 27,
            "w": 12,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "100 * node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes",
              "legendFormat": "{{hostname}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 11,
          "title": "CPU idle (%)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 12,
            "y": 27,
            "w": 12,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "100 * avg by (hostname) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))",
              "legendFormat": "{{hostname}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 12,
          "title": "SMART Device Power-On Hours (JBSRV01)",
          "type": "row",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 35,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 13,
          "title": "Power-on hours",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 0,
            "y": 36,
            "w": 24,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "h",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "smartctl_device_power_on_hours{instance=\"192.168.0.200\"}",
              "legendFormat": "{{device}} {{model_name}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 14,
          "title": "Backup / DR Status",
          "type": "row",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 44,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 15,
          "title": "Open gaps",
          "type": "text",
          "gridPos": {
            "x": 0,
            "y": 45,
            "w": 24,
            "h": 8
          },
          "options": {
            "mode": "markdown",
            "content": "\n### Open backup / DR gaps (from `project_open_defects`)\n\n- **JBSRV01** has no scheduled config backup. Loss of `/etc/pve` is reconstructable but slow.\n- **JBDNS01** has no backup at all. Pi-hole rebuild is doc-driven; gravity list, custom DNS, DHCP leases all rebuild from code.\n- **JBNAS_MEDIA** is a stripe pool (no parity, no snapshots). Single HDD failure loses 5 TB of Plex library.\n- **`data` pool** rsync targets back up project data, but `_inbox`, `mc-backups`, and `system-state` are single-copy.\n- **JBVM01 credential store** is single-copy on local disk.\n\nThese are tracked in `project_open_defects.md` (memory). When a textfile-collector\nbackup-status pipeline lands, the panels above this one will populate with\nlast-success timestamps and replace this static list.\n"
          }
        }
      ],
      "links": []
    }
