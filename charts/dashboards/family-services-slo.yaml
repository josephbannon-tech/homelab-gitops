apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-family-services-slo
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  family-services-slo.json: |
    {
      "title": "Family Services \u2014 SLO Board",
      "uid": "family-services-slo",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timezone": "Europe/London",
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "refresh": 1
          }
        ]
      },
      "panels": [
        {
          "id": 900,
          "title": "Active alerts \u2014 this dashboard's scope",
          "type": "row",
          "collapsed": false,
          "description": "",
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 901,
          "title": "Firing now",
          "type": "table",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "",
          "gridPos": {
            "x": 0,
            "y": 1,
            "w": 24,
            "h": 5
          },
          "options": {
            "showHeader": true,
            "sortBy": [
              {
                "displayName": "Severity",
                "desc": false
              }
            ]
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "ALERTS{alertstate=\"firing\", service=~\"plex|minecraft|pihole|nas|tailscale\"}",
              "instant": true,
              "format": "table",
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "Value": true,
                  "alertstate": true,
                  "namespace": true,
                  "prometheus": true,
                  "job": true,
                  "endpoint": true,
                  "container": true,
                  "pod": true,
                  "hostname": true,
                  "device": true,
                  "mountpoint": true,
                  "attribute_name": true,
                  "attribute_value_type": true,
                  "fstype": true,
                  "zpool": true,
                  "model_name": true,
                  "state": true,
                  "name": true
                },
                "renameByName": {
                  "alertname": "Alert",
                  "severity": "Severity",
                  "service": "Service",
                  "instance": "Host"
                },
                "indexByName": {
                  "alertname": 0,
                  "severity": 1,
                  "service": 2,
                  "instance": 3
                }
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "filterable": true
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Severity"
                },
                "properties": [
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "type": "color-text"
                    }
                  },
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "type": "value",
                        "options": {
                          "critical": {
                            "color": "red",
                            "text": "CRITICAL",
                            "index": 0
                          },
                          "warning": {
                            "color": "orange",
                            "text": "WARNING",
                            "index": 1
                          }
                        }
                      }
                    ]
                  }
                ]
              }
            ]
          }
        },
        {
          "id": 1,
          "title": "30-Day SLO Compliance (target lines: red=below, green=above)",
          "type": "row",
          "collapsed": false,
          "description": "",
          "gridPos": {
            "x": 0,
            "y": 7,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 2,
          "title": "Plex (target 99.5%)",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Plex availability over the trailing 30 days against the 99.5% target. Green = meeting SLO, yellow = within 0.1% of the line, red = SLO breached.",
          "gridPos": {
            "x": 0,
            "y": 8,
            "w": 5,
            "h": 4
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 99.4
                  },
                  {
                    "color": "green",
                    "value": 99.5
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "slo:plex:availability:ratio_30d * 100",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
