          "description": "SLO error-budget burn rate over 5m/1h/6h windows. 1.0 = consuming budget exactly on pace; above 6 is a warning, above 14.4 is critical and the 30-day SLO is at risk.",
          "gridPos": {
            "x": 0,
            "y": 13,
            "w": 6,
            "h": 7
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
