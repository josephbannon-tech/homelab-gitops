apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-logs-network-dns
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  logs-network-dns.json: |
    {
      "title": "Logs + Network/DNS Overview",
      "uid": "logs-network-dns",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timezone": "Europe/London",
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "refresh": 1
          }
        ]
      },
      "panels": [
        {
          "id": 900,
          "title": "Active alerts \u2014 this dashboard's scope",
          "type": "row",
          "collapsed": false,
          "description": "",
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 901,
          "title": "Firing now",
          "type": "table",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Alerts firing right now that fall within this dashboard's scope. Empty is good \u2014 any row is a live incident for these services.",
          "gridPos": {
            "x": 0,
            "y": 1,
            "w": 24,
            "h": 5
          },
          "options": {
            "showHeader": true,
            "sortBy": [
              {
                "displayName": "Severity",
                "desc": false
              }
            ]
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "ALERTS{alertstate=\"firing\", service=~\"loki|promtail|pihole\"}",
              "instant": true,
              "format": "table",
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "Value": true,
                  "alertstate": true,
                  "namespace": true,
                  "prometheus": true,
                  "job": true,
                  "endpoint": true,
                  "container": true,
                  "pod": true,
                  "hostname": true,
                  "device": true,
                  "mountpoint": true,
                  "attribute_name": true,
                  "attribute_value_type": true,
                  "fstype": true,
                  "zpool": true,
                  "model_name": true,
                  "state": true,
                  "name": true
                },
                "renameByName": {
                  "alertname": "Alert",
                  "severity": "Severity",
                  "service": "Service",
                  "instance": "Host"
                },
                "indexByName": {
                  "alertname": 0,
                  "severity": 1,
                  "service": 2,
                  "instance": 3
                }
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "filterable": true
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Severity"
                },
                "properties": [
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "type": "color-text"
                    }
                  },
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "type": "value",
                        "options": {
                          "critical": {
                            "color": "red",
                            "text": "CRITICAL",
                            "index": 0
                          },
                          "warning": {
                            "color": "orange",
                            "text": "WARNING",
                            "index": 1
                          }
                        }
                      }
                    ]
                  }
                ]
              }
            ]
          }
        },
        {
          "id": 1,
          "title": "Loki \u2014 Log Activity (last 5m)",
          "type": "row",
          "collapsed": false,
          "description": "",
          "gridPos": {
            "x": 0,
            "y": 7,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 2,
          "title": "Log rate per host (lines/sec)",
          "type": "timeseries",
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "description": "Total journal lines/sec per host from the systemd journal. A sudden spike flags a chatty or failing unit.",
          "gridPos": {
            "x": 0,
            "y": 8,
            "w": 12,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "loki"
              },
              "expr": "sum by (hostname) (rate({job=\"systemd-journal\"}[5m]))",
              "legendFormat": "{{hostname}}",
              "refId": "A",
              "queryType": "range"
            }
          ]
        },
        {
          "id": 3,
          "title": "Error rate per host (lines/sec)",
          "type": "timeseries",
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "description": "Journal lines matching 'error' (case-insensitive) per host. Should sit near zero; a rising line means a host is logging errors.",
          "gridPos": {
            "x": 12,
            "y": 8,
            "w": 12,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "loki"
              },
              "expr": "sum by (hostname) (rate({job=\"systemd-journal\"} |~ \"(?i)error\"[5m]))",
              "legendFormat": "{{hostname}}",
              "refId": "A",
              "queryType": "range"
            }
          ]
        },
        {
          "id": 4,
          "title": "Warning rate per host (lines/sec)",
          "type": "timeseries",
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "description": "Journal lines matching 'warn' (case-insensitive) per host. Useful as an early signal before warnings escalate to errors.",
          "gridPos": {
            "x": 0,
            "y": 16,
            "w": 12,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "loki"
              },
              "expr": "sum by (hostname) (rate({job=\"systemd-journal\"} |~ \"(?i)warn\"[5m]))",
              "legendFormat": "{{hostname}}",
              "refId": "A",
              "queryType": "range"
            }
          ]
        },
        {
          "id": 5,
          "title": "Top 10 noisy systemd units (lines/sec)",
          "type": "timeseries",
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "description": "The 10 systemd units producing the most log lines right now. Identifies which unit is responsible for a log-volume spike.",
          "gridPos": {
            "x": 12,
            "y": 16,
            "w": 12,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "loki"
              },
              "expr": "topk(10, sum by (hostname, unit) (rate({job=\"systemd-journal\"}[5m])))",
              "legendFormat": "{{hostname}} / {{unit}}",
              "refId": "A",
              "queryType": "range"
            }
          ]
        },
        {
          "id": 6,
          "title": "SSH auth failures (last 24h, journal)",
          "type": "row",
          "collapsed": false,
          "description": "",
          "gridPos": {
            "x": 0,
            "y": 24,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 7,
          "title": "Failed SSH password attempts",
          "type": "timeseries",
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "description": "Count of 'Failed password' lines from sshd over the last 24h, per host. A sustained climb indicates a brute-force attempt.",
          "gridPos": {
            "x": 0,
            "y": 25,
            "w": 24,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "loki"
              },
              "expr": "sum by (hostname) (count_over_time({job=\"systemd-journal\", unit=\"ssh.service\"} |~ \"Failed password\"[24h]))",
              "legendFormat": "{{hostname}}",
              "refId": "A",
              "queryType": "range"
            }
          ]
        },
        {
          "id": 8,
          "title": "Pi-hole DNS \u2014 Live",
          "type": "row",
          "collapsed": false,
          "description": "",
          "gridPos": {
            "x": 0,
            "y": 33,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 9,
          "title": "Queries (today)",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Total DNS queries Pi-hole has handled today. Informational; resets at midnight.",
          "gridPos": {
            "x": 0,
            "y": 34,
            "w": 6,
            "h": 4
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum(pihole_dns_queries_today)",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 10,
          "title": "Blocked (today)",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "DNS queries blocked as ads/trackers today. Informational; resets at midnight.",
          "gridPos": {
            "x": 6,
            "y": 34,
            "w": 6,
            "h": 4
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum(pihole_ads_blocked_today)",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 11,
          "title": "Blocked %",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Share of today's queries blocked. Informational, no threshold; typically 10-25% for this estate.",
          "gridPos": {
            "x": 12,
            "y": 34,
            "w": 6,
            "h": 4
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "text",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "avg(pihole_ads_percentage_today)",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 12,
          "title": "Domains in blocklist",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Number of domains on Pi-hole's active blocklists. Informational; a drop to zero means a gravity update failed.",
          "gridPos": {
            "x": 18,
            "y": 34,
            "w": 6,
            "h": 4
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "text",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "max(pihole_domains_being_blocked)",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 13,
          "title": "DNS queries/sec (5m rate)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "DNS query rate Pi-hole is serving (5m rate). A drop to zero while clients are active points to a DNS outage.",
          "gridPos": {
            "x": 0,
            "y": 38,
            "w": 12,
            "h": 7
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "rate(pihole_dns_queries_all_types[5m])",
              "legendFormat": "queries/s",
              "refId": "A"
            }
          ]
        },
        {
          "id": 14,
          "title": "Cache vs forwarded (1h rate)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Queries answered from Pi-hole's cache vs forwarded upstream (1h rate). A high cache share means fast local resolution.",
          "gridPos": {
            "x": 12,
            "y": 38,
            "w": 12,
            "h": 7
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "rate(pihole_queries_cached[1h])",
              "legendFormat": "cached",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "rate(pihole_queries_forwarded[1h])",
              "legendFormat": "forwarded",
              "refId": "B"
            }
          ]
        },
        {
          "id": 15,
          "title": "Pi-hole DNS \u2014 Blackbox probe (real user-facing SLI)",
          "type": "row",
          "collapsed": false,
          "description": "",
          "gridPos": {
            "x": 0,
            "y": 45,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 16,
          "title": "DNS probe",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Result of a real UDP/53 DNS lookup against 192.168.0.205. UP = the LAN can resolve names \u2014 the actual user-facing signal, independent of the pihole-exporter scrape.",
          "gridPos": {
            "x": 0,
            "y": 46,
            "w": 6,
            "h": 4
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": {
                      "text": "DOWN",
                      "color": "red",
                      "index": 0
                    },
                    "1": {
                      "text": "UP",
                      "color": "green",
                      "index": 1
                    }
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "probe_success{job=\"blackbox-dns-pihole\"}",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 18,
          "title": "DNS lookup time (s)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Round-trip time of the blackbox DNS probe. Rising lookup time means Pi-hole is slow to answer even when the probe still succeeds.",
          "gridPos": {
            "x": 6,
            "y": 46,
            "w": 18,
            "h": 4
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "probe_dns_lookup_time_seconds{job=\"blackbox-dns-pihole\"}",
              "legendFormat": "lookup",
              "refId": "A"
            }
          ]
        },
        {
          "id": 19,
          "title": "Network \u2014 Per-Host Throughput",
          "type": "row",
          "collapsed": false,
          "description": "",
          "gridPos": {
            "x": 0,
            "y": 50,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 20,
          "title": "Receive (Bps)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
