apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-nas-zfs
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  nas-zfs.json: |
    {
      "title": "NAS \u2014 ZFS Pools & ARC",
      "uid": "nas-zfs",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timezone": "Europe/London",
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "refresh": 1
          }
        ]
      },
      "panels": [
        {
          "id": 900,
          "title": "Active alerts \u2014 this dashboard's scope",
          "type": "row",
          "collapsed": false,
          "description": "",
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 901,
          "title": "Firing now",
          "type": "table",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "",
          "gridPos": {
            "x": 0,
            "y": 1,
            "w": 24,
            "h": 5
          },
          "options": {
            "showHeader": true,
            "sortBy": [
              {
                "displayName": "Severity",
                "desc": false
              }
            ]
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "ALERTS{alertstate=\"firing\", alertname=~\"Zfs.*|Smart.*|Nas.*\"}",
              "instant": true,
              "format": "table",
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "Value": true,
                  "alertstate": true,
                  "namespace": true,
                  "prometheus": true,
                  "job": true,
                  "endpoint": true,
                  "container": true,
                  "pod": true,
                  "hostname": true,
                  "device": true,
                  "mountpoint": true,
                  "attribute_name": true,
                  "attribute_value_type": true,
                  "fstype": true,
                  "zpool": true,
                  "model_name": true,
                  "state": true,
                  "name": true
                },
                "renameByName": {
                  "alertname": "Alert",
                  "severity": "Severity",
                  "service": "Service",
                  "instance": "Host"
                },
                "indexByName": {
                  "alertname": 0,
                  "severity": 1,
                  "service": 2,
                  "instance": 3
                }
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "filterable": true
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Severity"
                },
                "properties": [
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "type": "color-text"
                    }
                  },
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "type": "value",
                        "options": {
                          "critical": {
                            "color": "red",
                            "text": "CRITICAL",
                            "index": 0
                          },
                          "warning": {
                            "color": "orange",
                            "text": "WARNING",
                            "index": 1
                          }
                        }
                      }
                    ]
                  }
                ]
              }
            ]
          }
        },
        {
          "id": 1,
          "title": "ZFS Pool Health",
          "type": "row",
          "collapsed": false,
          "description": "",
          "gridPos": {
            "x": 0,
            "y": 7,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 2,
          "title": "JBNAS_SSD pool",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "zpool health of JBNAS_SSD (mirror \u2014 SMB share + app data). ONLINE = healthy; DEGRADED/other = zpool reports a fault, investigate with `zpool status` on JBNAS01.",
          "gridPos": {
            "x": 0,
            "y": 8,
            "w": 6,
            "h": 4
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": {
                      "text": "DEGRADED",
                      "color": "red",
                      "index": 0
                    },
                    "1": {
                      "text": "ONLINE",
                      "color": "green",
                      "index": 1
                    }
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "node_zfs_zpool_state{hostname=\"JBNAS01\", zpool=\"JBNAS_SSD\", state=\"online\"}",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "JBNAS_MEDIA pool",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "zpool health of JBNAS_MEDIA (the Plex library). This is a stripe pool with no parity \u2014 DEGRADED here means data loss is imminent, treat as a critical incident.",
          "gridPos": {
            "x": 6,
            "y": 8,
            "w": 6,
            "h": 4
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": {
                      "text": "DEGRADED",
                      "color": "red",
                      "index": 0
                    },
                    "1": {
                      "text": "ONLINE",
                      "color": "green",
                      "index": 1
                    }
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "node_zfs_zpool_state{hostname=\"JBNAS01\", zpool=\"JBNAS_MEDIA\", state=\"online\"}",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "ARC Hit Ratio",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Fraction of ZFS reads served from the in-RAM ARC cache. Normal above 90% (green); 70-90% yellow; below 70% red means cache pressure and slower reads.",
          "gridPos": {
            "x": 12,
            "y": 8,
            "w": 6,
            "h": 4
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 70
                  },
                  {
                    "color": "green",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "node_zfs_arc_hits{hostname=\"JBNAS01\"} / (node_zfs_arc_hits{hostname=\"JBNAS01\"} + node_zfs_arc_misses{hostname=\"JBNAS01\"}) * 100",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "title": "ARC Size",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Current size of the ZFS ARC cache in RAM. Informational, no threshold; ARC grows to use spare memory and shrinks under memory pressure.",
          "gridPos": {
            "x": 18,
            "y": 8,
            "w": 6,
            "h": 4
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "node_zfs_arc_size{hostname=\"JBNAS01\"}",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "title": "ZFS Pool Capacity",
          "type": "row",
          "collapsed": false,
          "description": "",
          "gridPos": {
            "x": 0,
            "y": 12,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 7,
          "title": "Data pool capacity used %",
          "type": "bargauge",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Percentage full of each data pool (JBNAS_SSD, JBNAS_MEDIA). Yellow at 70%, red at 90% \u2014 a full ZFS pool degrades write performance and blocks snapshots. boot-pool is excluded.",
          "gridPos": {
            "x": 0,
            "y": 13,
            "w": 24,
            "h": 6
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "orientation": "horizontal",
            "displayMode": "gradient",
            "valueMode": "color"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "mappings": [],
              "thresholds": {
                "mode": "percentage",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 70
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "100 * (1 - node_filesystem_avail_bytes{fstype=\"zfs\",device=~\"JBNAS_SSD|JBNAS_MEDIA\"} / node_filesystem_size_bytes{fstype=\"zfs\",device=~\"JBNAS_SSD|JBNAS_MEDIA\"})",
              "legendFormat": "{{device}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 8,
          "title": "ZFS ARC Detail",
          "type": "row",
          "collapsed": false,
          "description": "",
          "gridPos": {
            "x": 0,
            "y": 19,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 9,
          "title": "ARC Size vs Max",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "ZFS ARC size over time against its c_max ceiling and c_min floor. ARC riding at c_max is healthy (cache fully warmed); dropping toward c_min indicates memory pressure on the NAS.",
          "gridPos": {
            "x": 0,
            "y": 20,
            "w": 24,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "node_zfs_arc_size{hostname=\"JBNAS01\"}",
              "legendFormat": "ARC Used",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "node_zfs_arc_c_max{hostname=\"JBNAS01\"}",
              "legendFormat": "ARC Max",
              "refId": "B"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "node_zfs_arc_c_min{hostname=\"JBNAS01\"}",
              "legendFormat": "ARC Min",
              "refId": "C"
            }
          ]
        },
        {
          "id": 10,
          "title": "ARC Hit/Miss Rate",
          "type": "row",
          "collapsed": false,
          "description": "",
          "gridPos": {
            "x": 0,
            "y": 28,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 11,
          "title": "ARC Demand Hits / Misses",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Per-second ARC demand hits vs misses for data and metadata. A rising miss rate means the working set no longer fits in ARC.",
          "gridPos": {
            "x": 0,
            "y": 29,
            "w": 24,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "rate(node_zfs_arc_demand_data_hits{hostname=\"JBNAS01\"}[5m])",
              "legendFormat": "Data Hits",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "rate(node_zfs_arc_demand_data_misses{hostname=\"JBNAS01\"}[5m])",
              "legendFormat": "Data Misses",
              "refId": "B"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "rate(node_zfs_arc_demand_metadata_hits{hostname=\"JBNAS01\"}[5m])",
              "legendFormat": "Meta Hits",
              "refId": "C"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "rate(node_zfs_arc_demand_metadata_misses{hostname=\"JBNAS01\"}[5m])",
              "legendFormat": "Meta Misses",
              "refId": "D"
            }
          ]
        },
        {
          "id": 12,
          "title": "NAS Host Resources",
          "type": "row",
          "collapsed": false,
          "description": "",
          "gridPos": {
            "x": 0,
            "y": 37,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 13,
          "title": "NAS CPU %",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "JBNAS01 CPU utilisation over time. Sustained high values during scrubs or Plex transcodes are expected; otherwise it should sit low.",
          "gridPos": {
            "x": 0,
            "y": 38,
            "w": 12,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "100 - (avg by (instance) (rate(node_cpu_seconds_total{instance=\"192.168.0.201\",mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "CPU %",
              "refId": "A"
            }
          ]
        },
        {
          "id": 14,
          "title": "NAS Memory",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "JBNAS01 memory used vs total. Used tracking close to Total is normal \u2014 ZFS ARC claims free RAM and yields it on demand.",
          "gridPos": {
            "x": 12,
            "y": 38,
            "w": 12,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "node_memory_MemTotal_bytes{instance=\"192.168.0.201\"} - node_memory_MemAvailable_bytes{instance=\"192.168.0.201\"}",
              "legendFormat": "Used",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "node_memory_MemTotal_bytes{instance=\"192.168.0.201\"}",
              "legendFormat": "Total",
              "refId": "B"
            }
          ]
        }
      ],
      "links": []
    }
