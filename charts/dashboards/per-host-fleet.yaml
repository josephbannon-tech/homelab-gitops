apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-per-host-fleet
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  per-host-fleet.json: |
    {
      "title": "Per-Host Fleet Drill-Down",
      "uid": "per-host-fleet",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timezone": "Europe/London",
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "refresh": 1
          },
          {
            "name": "hostname",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "${datasource}"
            },
            "query": "label_values(node_uname_info, nodename)",
            "current": {},
            "refresh": 1,
            "includeAll": false,
            "multi": false,
            "label": "Host",
            "hide": 0,
            "sort": 1
          }
        ]
      },
      "panels": [
        {
          "id": 900,
          "title": "Active alerts \u2014 this dashboard's scope",
          "type": "row",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 901,
          "title": "Firing now",
          "type": "table",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 0,
            "y": 1,
            "w": 24,
            "h": 5
          },
          "options": {
            "showHeader": true,
            "sortBy": [
              {
                "displayName": "Severity",
                "desc": false
              }
            ]
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "ALERTS{alertstate=\"firing\", hostname=~\"$hostname\"}",
              "instant": true,
              "format": "table",
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "Value": true,
                  "alertstate": true,
                  "namespace": true,
                  "prometheus": true,
                  "job": true,
                  "endpoint": true,
                  "container": true,
                  "pod": true,
                  "hostname": true,
                  "device": true,
                  "mountpoint": true,
                  "attribute_name": true,
                  "attribute_value_type": true,
                  "fstype": true,
                  "zpool": true,
                  "model_name": true,
                  "state": true,
                  "name": true
                },
                "renameByName": {
                  "alertname": "Alert",
                  "severity": "Severity",
                  "service": "Service",
                  "instance": "Host"
                },
                "indexByName": {
                  "alertname": 0,
                  "severity": 1,
                  "service": 2,
                  "instance": 3
                }
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "filterable": true
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Severity"
                },
                "properties": [
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "type": "color-text"
                    }
                  },
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "type": "value",
                        "options": {
                          "critical": {
                            "color": "red",
                            "text": "CRITICAL",
                            "index": 0
                          },
                          "warning": {
                            "color": "orange",
                            "text": "WARNING",
                            "index": 1
                          }
                        }
                      }
                    ]
                  }
                ]
              }
            ]
          }
        },
        {
          "id": 1,
          "title": "Snapshot",
          "type": "row",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 7,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 2,
          "title": "Uptime",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 0,
            "y": 8,
            "w": 5,
            "h": 4
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "dtdurations",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "time() - node_boot_time_seconds{hostname=\"$hostname\"}",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Load (1m)",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 5,
            "y": 8,
            "w": 5,
            "h": 4
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "text",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "node_load1{hostname=\"$hostname\"}",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "CPU busy %",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 10,
            "y": 8,
            "w": 5,
            "h": 4
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 70
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "100 - (avg by (hostname) (rate(node_cpu_seconds_total{hostname=\"$hostname\",mode=\"idle\"}[5m])) * 100)",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "title": "Free RAM %",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 15,
            "y": 8,
            "w": 5,
            "h": 4
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 10
                  },
                  {
                    "color": "green",
                    "value": 25
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "100 * node_memory_MemAvailable_bytes{hostname=\"$hostname\"} / node_memory_MemTotal_bytes{hostname=\"$hostname\"}",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "title": "Root FS free %",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 20,
            "y": 8,
            "w": 4,
            "h": 4
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 10
                  },
                  {
                    "color": "green",
                    "value": 20
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "100 * node_filesystem_avail_bytes{hostname=\"$hostname\",mountpoint=\"/\"} / node_filesystem_size_bytes{hostname=\"$hostname\",mountpoint=\"/\"}",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 7,
          "title": "CPU & Memory",
          "type": "row",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 12,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 8,
          "title": "CPU usage by mode",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 0,
            "y": 13,
            "w": 12,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "normal"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum by (mode) (rate(node_cpu_seconds_total{hostname=\"$hostname\",mode!=\"idle\"}[5m])) / on() group_left scalar(count(node_cpu_seconds_total{hostname=\"$hostname\",mode=\"idle\"}))",
              "legendFormat": "{{mode}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 9,
          "title": "Memory breakdown",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 12,
            "y": 13,
            "w": 12,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "node_memory_MemTotal_bytes{hostname=\"$hostname\"} - node_memory_MemAvailable_bytes{hostname=\"$hostname\"}",
              "legendFormat": "Used",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "node_memory_Cached_bytes{hostname=\"$hostname\"} + node_memory_Buffers_bytes{hostname=\"$hostname\"}",
              "legendFormat": "Cache+Buffers",
              "refId": "B"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "node_memory_MemFree_bytes{hostname=\"$hostname\"}",
              "legendFormat": "Free",
              "refId": "C"
            }
          ]
        },
        {
          "id": 10,
          "title": "Disk & Network",
          "type": "row",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 21,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 11,
          "title": "Disk I/O (Bps)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 0,
            "y": 22,
            "w": 12,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "rate(node_disk_read_bytes_total{hostname=\"$hostname\",device!~\"loop.*|dm-.*\"}[5m])",
              "legendFormat": "read {{device}}",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "rate(node_disk_written_bytes_total{hostname=\"$hostname\",device!~\"loop.*|dm-.*\"}[5m])",
              "legendFormat": "write {{device}}",
              "refId": "B"
            }
          ]
        },
        {
          "id": 12,
          "title": "Network rx/tx (Bps)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 12,
            "y": 22,
            "w": 12,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "rate(node_network_receive_bytes_total{hostname=\"$hostname\",device!~\"lo|veth.*|tailscale.*|cni.*|cali.*\"}[5m])",
              "legendFormat": "rx {{device}}",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "rate(node_network_transmit_bytes_total{hostname=\"$hostname\",device!~\"lo|veth.*|tailscale.*|cni.*|cali.*\"}[5m])",
              "legendFormat": "tx {{device}}",
              "refId": "B"
            }
          ]
        },
        {
          "id": 13,
          "title": "Filesystem usage % (per mountpoint)",
          "type": "bargauge",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 0,
            "y": 30,
            "w": 24,
            "h": 6
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "orientation": "horizontal",
            "displayMode": "gradient",
            "valueMode": "color"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "mappings": [],
              "thresholds": {
                "mode": "percentage",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 70
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "100 - (100 * node_filesystem_avail_bytes{hostname=\"$hostname\",fstype!~\"tmpfs|overlay|squashfs|devtmpfs|fuse.*|ramfs|autofs|nsfs|tracefs|securityfs|cgroup.*|bpf|debugfs|configfs|hugetlbfs|mqueue|pstore|sysfs|proc|none\",mountpoint!~\"/var/lib/kubelet.*|/var/lib/docker.*|/run.*|/snap.*|/boot/efi\"} / node_filesystem_size_bytes{hostname=\"$hostname\",fstype!~\"tmpfs|overlay|squashfs|devtmpfs|fuse.*|ramfs|autofs|nsfs|tracefs|securityfs|cgroup.*|bpf|debugfs|configfs|hugetlbfs|mqueue|pstore|sysfs|proc|none\",mountpoint!~\"/var/lib/kubelet.*|/var/lib/docker.*|/run.*|/snap.*|/boot/efi\"})",
              "legendFormat": "{{mountpoint}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 14,
          "title": "Logs (Loki, journal)",
          "type": "row",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 36,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 15,
          "title": "Top 10 noisy units (lines/sec)",
          "type": "timeseries",
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "gridPos": {
            "x": 0,
            "y": 37,
            "w": 12,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "loki"
              },
              "expr": "topk(10, sum by (unit) (rate({hostname=\"$hostname\",job=\"systemd-journal\"}[5m])))",
              "legendFormat": "{{unit}}",
              "refId": "A",
              "queryType": "range"
            }
          ]
        },
        {
          "id": 16,
          "title": "Error / warn rate",
          "type": "timeseries",
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "gridPos": {
            "x": 12,
            "y": 37,
            "w": 12,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "loki"
              },
              "expr": "sum(rate({hostname=\"$hostname\",job=\"systemd-journal\"} |~ \"(?i)error\"[5m]))",
              "legendFormat": "errors",
              "refId": "A",
              "queryType": "range"
            },
            {
              "datasource": {
                "type": "loki",
                "uid": "loki"
              },
              "expr": "sum(rate({hostname=\"$hostname\",job=\"systemd-journal\"} |~ \"(?i)warn\"[5m]))",
              "legendFormat": "warnings",
              "refId": "B",
              "queryType": "range"
            }
          ]
        },
        {
          "id": 17,
          "title": "SSH failed-password attempts (24h count)",
          "type": "timeseries",
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "gridPos": {
            "x": 0,
            "y": 45,
            "w": 24,
            "h": 6
          },
          "options": {
            "tooltip": {
              "mode": "multi",
