apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-proxmox-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  proxmox-overview.json: |
    {
      "title": "Proxmox \u2014 Host & Guest Overview",
      "uid": "proxmox-overview",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timezone": "Europe/London",
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "refresh": 1
          }
        ]
      },
      "panels": [
        {
          "id": 900,
          "title": "Active alerts \u2014 this dashboard's scope",
          "type": "row",
          "collapsed": false,
          "description": "",
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 901,
          "title": "Firing now",
          "type": "table",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Alerts firing right now that fall within this dashboard's scope. Empty is good \u2014 any row is a live incident for these services.",
          "gridPos": {
            "x": 0,
            "y": 1,
            "w": 24,
            "h": 5
          },
          "options": {
            "showHeader": true,
            "sortBy": [
              {
                "displayName": "Severity",
                "desc": false
              }
            ]
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "ALERTS{alertstate=\"firing\", service=~\"storage|compute\"}",
              "instant": true,
              "format": "table",
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "Value": true,
                  "alertstate": true,
                  "namespace": true,
                  "prometheus": true,
                  "job": true,
                  "endpoint": true,
                  "container": true,
                  "pod": true,
                  "hostname": true,
                  "device": true,
                  "mountpoint": true,
                  "attribute_name": true,
                  "attribute_value_type": true,
                  "fstype": true,
                  "zpool": true,
                  "model_name": true,
                  "state": true,
                  "name": true
                },
                "renameByName": {
                  "alertname": "Alert",
                  "severity": "Severity",
                  "service": "Service",
                  "instance": "Host"
                },
                "indexByName": {
                  "alertname": 0,
                  "severity": 1,
                  "service": 2,
                  "instance": 3
                }
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "filterable": true
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Severity"
                },
                "properties": [
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "type": "color-text"
                    }
                  },
                  {
                    "id": "mappings",
                    "value": [
                      {
                        "type": "value",
                        "options": {
                          "critical": {
                            "color": "red",
                            "text": "CRITICAL",
                            "index": 0
                          },
                          "warning": {
                            "color": "orange",
                            "text": "WARNING",
                            "index": 1
                          }
                        }
                      }
                    ]
                  }
                ]
              }
            ]
          }
        },
        {
          "id": 1,
          "title": "JBSRV01 Host",
          "type": "row",
          "collapsed": false,
          "description": "",
          "gridPos": {
            "x": 0,
            "y": 7,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 2,
          "title": "Host CPU",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Hypervisor CPU utilisation across all cores. Normal below 60%; yellow at 70%, red at 90% indicates the host is CPU-constrained and guests may be throttled.",
          "gridPos": {
            "x": 0,
            "y": 8,
            "w": 6,
            "h": 4
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 70
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "pve_cpu_usage_ratio{id=\"node/JBSRV01\"} * 100",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Host Memory",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Hypervisor RAM in use as a percentage of installed memory. Normal below 70%; red at 90% risks the OOM killer reaping a guest or ZFS ARC.",
          "gridPos": {
            "x": 6,
            "y": 8,
            "w": 6,
            "h": 4
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 70
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "pve_memory_usage_bytes{id=\"node/JBSRV01\"} / pve_memory_size_bytes{id=\"node/JBSRV01\"} * 100",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Host Uptime",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Time since the hypervisor last booted. Informational, no threshold; a sudden reset to near-zero means JBSRV01 rebooted.",
          "gridPos": {
            "x": 12,
            "y": 8,
            "w": 6,
            "h": 4
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "dtdurations",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "pve_uptime_seconds{id=\"node/JBSRV01\"}",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "title": "Guests Running (of 6)",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Count of QEMU/LXC guests reporting pve_up==1. Expected 6 (all defined guests). A lower number means a guest is stopped or crashed.",
          "gridPos": {
            "x": 18,
            "y": 8,
            "w": 6,
            "h": 4
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "count(pve_up{id!~\"node/.*|storage/.*\"} == 1)",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "title": "CPU & Memory Over Time",
          "type": "row",
          "collapsed": false,
          "description": "",
          "gridPos": {
            "x": 0,
            "y": 12,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 10,
          "title": "Guest CPU %",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Per-guest CPU utilisation over time. Each line is one VM/LXC; sustained high lines flag a busy or runaway guest.",
          "gridPos": {
            "x": 0,
            "y": 13,
            "w": 12,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "pve_cpu_usage_ratio{id!~\"node/.*\"} * on(id) group_left(name) pve_guest_info * 100",
              "legendFormat": "{{name}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 11,
          "title": "Guest Memory Used",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Per-guest memory consumption over time. Watch for a guest climbing steadily \u2014 a likely memory leak.",
          "gridPos": {
            "x": 12,
            "y": 13,
            "w": 12,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "pve_memory_usage_bytes{id!~\"node/.*\"} * on(id) group_left(name) pve_guest_info",
              "legendFormat": "{{name}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 20,
          "title": "Hypervisor CPU & Memory over time",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "JBSRV01 host CPU and memory utilisation over time (the history behind the instant Host CPU/Memory stats). Both should track well below 90%.",
          "gridPos": {
            "x": 0,
            "y": 21,
            "w": 12,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "pve_cpu_usage_ratio{id=\"node/JBSRV01\"} * 100",
              "legendFormat": "Host CPU %",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "pve_memory_usage_bytes{id=\"node/JBSRV01\"} / pve_memory_size_bytes{id=\"node/JBSRV01\"} * 100",
              "legendFormat": "Host Mem %",
              "refId": "B"
            }
          ]
        },
        {
          "id": 21,
          "title": "Host load average",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Run-queue load average for the hypervisor (1/5/15m windows). Compare to the host vCPU count: load near vCPUs means fully busy, well above means CPU saturation and scheduling delay.",
          "gridPos": {
            "x": 12,
            "y": 21,
            "w": 12,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 0,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "node_load1{instance=\"192.168.0.200\"}",
              "legendFormat": "1m",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "node_load5{instance=\"192.168.0.200\"}",
              "legendFormat": "5m",
              "refId": "B"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "node_load15{instance=\"192.168.0.200\"}",
              "legendFormat": "15m",
              "refId": "C"
            }
          ]
        },
        {
          "id": 12,
          "title": "Disk & Network I/O",
          "type": "row",
          "collapsed": false,
          "description": "",
          "gridPos": {
            "x": 0,
            "y": 29,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 13,
          "title": "Disk Read",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Per-guest disk read throughput (5m rate). Spikes are normal during backups or boot.",
          "gridPos": {
            "x": 0,
            "y": 30,
            "w": 12,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "rate(pve_disk_read_bytes{id!~\"node/.*|storage/.*\"}[5m]) * on(id) group_left(name) pve_guest_info",
              "legendFormat": "{{name}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 14,
          "title": "Disk Write",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Per-guest disk write throughput (5m rate). Sustained high write may indicate heavy logging or a database workload.",
          "gridPos": {
            "x": 12,
            "y": 30,
            "w": 12,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "rate(pve_disk_write_bytes{id!~\"node/.*|storage/.*\"}[5m]) * on(id) group_left(name) pve_guest_info",
              "legendFormat": "{{name}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 15,
          "title": "Network Rx",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Per-guest inbound network throughput (5m rate).",
          "gridPos": {
            "x": 0,
            "y": 38,
            "w": 12,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "rate(pve_network_receive_bytes{id!~\"node/.*|storage/.*\"}[5m]) * on(id) group_left(name) pve_guest_info",
              "legendFormat": "{{name}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 16,
          "title": "Network Tx",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Per-guest outbound network throughput (5m rate). Plex streaming shows here as JBNAS01 Tx.",
          "gridPos": {
            "x": 12,
            "y": 38,
            "w": 12,
            "h": 8
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "max",
                "mean",
                "lastNotNull"
              ]
            },
            "stacking": {
              "mode": "none"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "gradientMode": "opacity"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "rate(pve_network_transmit_bytes{id!~\"node/.*|storage/.*\"}[5m]) * on(id) group_left(name) pve_guest_info",
              "legendFormat": "{{name}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 17,
          "title": "Proxmox Storage",
          "type": "row",
          "collapsed": false,
          "description": "",
          "gridPos": {
            "x": 0,
            "y": 46,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 18,
          "title": "Storage Disk Usage",
          "type": "bargauge",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Percentage full of each Proxmox storage pool. Yellow at 70%, red at 90% \u2014 a full storage pool blocks new guest disks and snapshots.",
          "gridPos": {
            "x": 0,
            "y": 47,
            "w": 12,
            "h": 6
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "orientation": "horizontal",
            "displayMode": "gradient",
            "valueMode": "color"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "mappings": [],
              "thresholds": {
                "mode": "percentage",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 70
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
