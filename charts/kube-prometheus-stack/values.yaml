kube-prometheus-stack:
  # Grafana — exposed on NodePort 30300
  grafana:
    # The chart bundles ~24 upstream Grafana dashboards (node-exporter, k8s
    # views). We provision our own from charts/dashboards/gen-dashboards.py;
    # the bundled set is redundant clutter in the dashboard list.
    defaultDashboardsEnabled: false
    service:
      type: NodePort
      nodePort: 30300
    persistence:
      enabled: true
      storageClassName: local-path
      size: 2Gi
    # initChownData disabled: local-path PVs don't allow the chown init container to run.
    # fsGroup 472 (grafana uid) ensures the kernel sets correct group ownership at mount time.
    initChownData:
      enabled: false
    securityContext:
      runAsUser: 472
      runAsGroup: 472
      fsGroup: 472
    # Retrieve admin password: kubectl get secret -n monitoring kube-prometheus-stack-grafana -o jsonpath='{.data.admin-password}' | base64 -d
    # Image renderer sidecar (separate Deployment + Service). Powers the
    # /render/* HTTP endpoints used to PNG-snapshot dashboards. The chart
    # auto-configures grafana.ini.rendering.{server_url, callback_url} and
    # the shared renderer token — do not override here.
    imageRenderer:
      enabled: true
      replicas: 1
      resources:
        requests: {cpu: 50m, memory: 128Mi}
        limits: {cpu: 500m, memory: 512Mi}
    additionalDataSources:
      - name: Loki
        type: loki
        uid: loki
        url: http://loki.monitoring.svc.cluster.local:3100
        access: proxy
        isDefault: false
      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo.monitoring.svc.cluster.local:3200
        access: proxy
        isDefault: false
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            spanStartTimeShift: "-1h"
            spanEndTimeShift: "1h"
            filterByTraceID: true
            filterBySpanID: true
          lokiSearch:
            datasourceUid: loki
          tracesToMetrics:
            datasourceUid: prometheus
            spanStartTimeShift: "-1h"
            spanEndTimeShift: "1h"

  # Prometheus — NodePort 30900 for direct PromQL access
  prometheus:
    service:
      type: NodePort
      nodePort: 30900
    prometheusSpec:
      retention: 30d
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 20Gi
      additionalScrapeConfigs:
        - job_name: node-exporter-external
          static_configs:
            - targets: ['192.168.0.201:9100']
              labels: {hostname: JBNAS01, role: nas}
            - targets: ['192.168.0.203:9100']
              labels: {hostname: JBVM02, role: claude-code}
            - targets: ['192.168.0.204:9100']
              labels: {hostname: JBVM03, role: prod}
            - targets: ['192.168.0.206:9100']
              labels: {hostname: JBVM01, role: jumpbox}
            - targets: ['192.168.0.205:9100']
              labels: {hostname: JBDNS01, role: dns}
            - targets: ['192.168.0.200:9100']
              labels: {hostname: JBSRV01, role: hypervisor}
          relabel_configs:
            - source_labels: [__address__]
              regex: '([^:]+):.*'
              target_label: instance
              replacement: '$1'
        - job_name: proxmox
          metrics_path: /pve
          params:
            module: [default]
          static_configs:
            - targets:
                - 192.168.0.200
              labels:
                hostname: JBSRV01
                role: proxmox
          relabel_configs:
            - source_labels: [__address__]
              target_label: __param_target
            - source_labels: [__param_target]
              target_label: instance
            - target_label: __address__
              replacement: pve-exporter.monitoring.svc.cluster.local:9221
        # smartctl_exporter runs only on JBSRV01 (Proxmox host); the NAS VM only
        # sees QEMU virtio devices, so SMART data is collected once at the host
        # where all 8 physical drives are visible.
        - job_name: smartctl
          static_configs:
            - targets: ['192.168.0.200:9633']
              labels: {hostname: JBSRV01, role: hypervisor}
          relabel_configs:
            - source_labels: [__address__]
              regex: '([^:]+):.*'
              target_label: instance
              replacement: '$1'
        # mc-monitor pings the MC server-list-ping endpoint and exposes
        # minecraft_status_* metrics on :9150. RCON is not used.
        - job_name: minecraft
          static_configs:
            - targets: ['192.168.0.204:9150']
              labels: {hostname: JBVM03, role: prod}
          relabel_configs:
            - source_labels: [__address__]
              regex: '([^:]+):.*'
              target_label: instance
              replacement: '$1'
        # NOTE: pihole and plex are scraped via ServiceMonitor in their own
        # charts (charts/pihole-exporter/servicemonitor.yaml,
        # charts/plex-exporter/servicemonitor.yaml). Both SMs set job=pihole
        # and job=plex via relabeling so existing recording rules still match.
        # External targets below stay as static_configs because they live
        # outside the cluster (ServiceMonitor doesn't apply).
        # tailscaled --debug exposes Prometheus-format metrics at /debug/metrics.
        # Only enabled on hosts that actually run Tailscale (JBVM03, JBDNS01).
        - job_name: tailscale-nodes
          metrics_path: /debug/metrics
          static_configs:
            - targets: ['192.168.0.204:5252']
              labels: {hostname: JBVM03, role: prod}
            - targets: ['192.168.0.205:5252']
              labels: {hostname: JBDNS01, role: dns}
          relabel_configs:
            - source_labels: [__address__]
              regex: '([^:]+):.*'
              target_label: instance
              replacement: '$1'

  # Alertmanager — config loaded from k8s Secret (webhook URL kept out of Git)
  # Secret 'alertmanager-main' in namespace 'monitoring' holds alertmanager.yaml
  # To update: kubectl edit secret alertmanager-main -n monitoring, then rollout restart
  alertmanager:
    alertmanagerSpec:
      configSecret: alertmanager-main
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 1Gi

  # node-exporter runs as a DaemonSet — picks up host metrics automatically
  prometheus-node-exporter:
    enabled: true

  # k3s embeds these components — they don't expose standard metrics ports.
  # Disable to prevent false-positive "Down" alerts.
  kubeScheduler:
    enabled: false
  kubeControllerManager:
    enabled: false
  kubeProxy:
    enabled: false

  # Built-in alert rules: the chart ships 148. We keep ~69 — the groups that
  # match this single-node estate's signal model (apps, storage, and the
  # monitoring stack itself) and ALL recording-rule groups (dashboards depend
  # on them, left at their default true). The 11 groups below are dropped:
  # k3s embeds the control-plane components (kube{Proxy,Scheduler,Controller
  # Manager} produce false "down" noise), it uses kine/sqlite not etcd, the
  # apiserver-SLO and multi-node kubelet/system alerts don't fit a one-node
  # cluster, there are no resource quotas, and nodeExporterAlerting includes
  # NodeMemoryHighUtilization (the MemAvailable false-positive already removed)
  # and duplicates the curated NodeFilesystem* rules below.
  defaultRules:
    rules:
      etcd: false
      kubeApiserverSlos: false
      kubeControllerManager: false
      kubeProxy: false
      kubeSchedulerAlerting: false
      kubelet: false
      kubernetesResources: false
      kubernetesSystem: false
      network: false
      nodeExporterAlerting: false
      windows: false

  # Family-services SLO rules (recording + multi-window multi-burn-rate alerts).
  # Targets:
  #   plex      99.5% / 30d   error budget = 0.5%
  #   minecraft 99.0% / 30d   error budget = 1.0%
  #   pihole    99.9% / 30d   error budget = 0.1%
  #   nas       99.9% / 30d   error budget = 0.1%
  #   tailscale 99.0% / 30d   error budget = 1.0% (per node)
  # Alerts: fast burn (14.4x over 1h+5m → critical), slow burn (6x over 6h+30m → warning).
  # Pattern: Google SRE Workbook §5.4 multi-window multi-burn-rate.
  additionalPrometheusRulesMap:
    family-services-slo:
      groups:
        - name: family-services.slo.recording
          interval: 1m
          rules:
            # 30-day availability (used by dashboards)
            - record: slo:plex:availability:ratio_30d
              expr: avg_over_time(up{job="plex"}[30d])
            - record: slo:minecraft:availability:ratio_30d
              expr: avg_over_time(minecraft_status_healthy[30d])
            - record: slo:pihole:availability:ratio_30d
              expr: avg_over_time(up{job="pihole"}[30d])
            - record: slo:nas:availability:ratio_30d
              expr: avg_over_time(up{job="node-exporter-external", hostname="JBNAS01"}[30d])
            - record: slo:tailscale:availability:ratio_30d
              expr: avg_over_time(up{job="tailscale-nodes"}[30d])

            # Burn rate — short windows (for fast-burn alert)
            - record: slo:plex:burn_rate:5m
              expr: (1 - avg_over_time(up{job="plex"}[5m])) / 0.005
            - record: slo:plex:burn_rate:1h
              expr: (1 - avg_over_time(up{job="plex"}[1h])) / 0.005
            - record: slo:minecraft:burn_rate:5m
              expr: (1 - avg_over_time(minecraft_status_healthy[5m])) / 0.01
            - record: slo:minecraft:burn_rate:1h
              expr: (1 - avg_over_time(minecraft_status_healthy[1h])) / 0.01
            - record: slo:pihole:burn_rate:5m
              expr: (1 - avg_over_time(up{job="pihole"}[5m])) / 0.001
            - record: slo:pihole:burn_rate:1h
              expr: (1 - avg_over_time(up{job="pihole"}[1h])) / 0.001
            - record: slo:nas:burn_rate:5m
              expr: (1 - avg_over_time(up{job="node-exporter-external", hostname="JBNAS01"}[5m])) / 0.001
            - record: slo:nas:burn_rate:1h
              expr: (1 - avg_over_time(up{job="node-exporter-external", hostname="JBNAS01"}[1h])) / 0.001
            - record: slo:tailscale:burn_rate:5m
              expr: (1 - avg_over_time(up{job="tailscale-nodes"}[5m])) / 0.01
            - record: slo:tailscale:burn_rate:1h
              expr: (1 - avg_over_time(up{job="tailscale-nodes"}[1h])) / 0.01

            # Burn rate — long windows (for slow-burn alert)
            - record: slo:plex:burn_rate:30m
              expr: (1 - avg_over_time(up{job="plex"}[30m])) / 0.005
            - record: slo:plex:burn_rate:6h
              expr: (1 - avg_over_time(up{job="plex"}[6h])) / 0.005
            - record: slo:minecraft:burn_rate:30m
              expr: (1 - avg_over_time(minecraft_status_healthy[30m])) / 0.01
            - record: slo:minecraft:burn_rate:6h
              expr: (1 - avg_over_time(minecraft_status_healthy[6h])) / 0.01
            - record: slo:pihole:burn_rate:30m
              expr: (1 - avg_over_time(up{job="pihole"}[30m])) / 0.001
            - record: slo:pihole:burn_rate:6h
              expr: (1 - avg_over_time(up{job="pihole"}[6h])) / 0.001
            - record: slo:nas:burn_rate:30m
              expr: (1 - avg_over_time(up{job="node-exporter-external", hostname="JBNAS01"}[30m])) / 0.001
            - record: slo:nas:burn_rate:6h
              expr: (1 - avg_over_time(up{job="node-exporter-external", hostname="JBNAS01"}[6h])) / 0.001
            - record: slo:tailscale:burn_rate:30m
              expr: (1 - avg_over_time(up{job="tailscale-nodes"}[30m])) / 0.01
            - record: slo:tailscale:burn_rate:6h
              expr: (1 - avg_over_time(up{job="tailscale-nodes"}[6h])) / 0.01

        # runbook_url targets the planned `homelab-runbooks` portfolio repo.
        # URLs are stable: when runbooks are authored there, no change here.
        - name: family-services.slo.alerts
          rules:
            # Fast burn: 14.4× over 1h burns 2% of monthly budget in 1h.
            # Confirm with 5m to avoid flapping.
            - alert: PlexErrorBudgetBurnFast
              expr: slo:plex:burn_rate:1h > 14.4 and slo:plex:burn_rate:5m > 14.4
              for: 2m
              labels: {severity: critical, service: plex}
              annotations:
                summary: "Plex burning SLO budget fast (>14.4x for 1h)"
                host: "NvidiaShield (192.168.0.202:32400)"
                value: "{{ $value | printf \"%.1f\" }}x error-budget burn rate (1h window)"
                threshold: "fast burn >14.4x, sustained 2m"
                impact: "Plex is unreachable or erroring. At this rate the 0.5% monthly error budget is gone in under 2 days; family streaming is affected."
                action: "Check Plex Media Server on the Shield (192.168.0.202:32400) and the in-cluster plex-exporter pod."
                runbook_url: "https://github.com/jbannon/homelab-runbooks/blob/main/plex-burn-rate.md"
            - alert: PlexErrorBudgetBurnSlow
              expr: slo:plex:burn_rate:6h > 6 and slo:plex:burn_rate:30m > 6
              for: 15m
              labels: {severity: warning, service: plex}
              annotations:
                summary: "Plex burning SLO budget slowly (>6x for 6h)"
                host: "NvidiaShield (192.168.0.202:32400)"
                value: "{{ $value | printf \"%.1f\" }}x error-budget burn rate (6h window)"
                threshold: "slow burn >6x, sustained 15m"
                impact: "Plex availability has degraded over 6h; family sessions are likely intermittently affected."
                action: "Check the Shield host, the network path to Plex, and Plex transcoding load."
                runbook_url: "https://github.com/jbannon/homelab-runbooks/blob/main/plex-burn-rate.md"

            - alert: MinecraftErrorBudgetBurnFast
              expr: slo:minecraft:burn_rate:1h > 14.4 and slo:minecraft:burn_rate:5m > 14.4
              for: 2m
              labels: {severity: critical, service: minecraft}
              annotations:
                summary: "Minecraft burning SLO budget fast"
                host: "JBVM03 (192.168.0.204)"
                value: "{{ $value | printf \"%.1f\" }}x error-budget burn rate (1h window)"
                threshold: "fast burn >14.4x, sustained 2m"
                impact: "The Minecraft server is not answering server-list-ping; active players are being disconnected."
                action: "Check the minecraft systemd unit on JBVM03 and the JVM heap/GC state."
                runbook_url: "https://github.com/jbannon/homelab-runbooks/blob/main/minecraft-burn-rate.md"
            - alert: MinecraftErrorBudgetBurnSlow
              expr: slo:minecraft:burn_rate:6h > 6 and slo:minecraft:burn_rate:30m > 6
              for: 15m
              labels: {severity: warning, service: minecraft}
              annotations:
                summary: "Minecraft burning SLO budget slowly"
                host: "JBVM03 (192.168.0.204)"
                value: "{{ $value | printf \"%.1f\" }}x error-budget burn rate (6h window)"
                threshold: "slow burn >6x, sustained 15m"
                impact: "Minecraft availability has degraded over 6h — likely a flapping server or restart loop."
                action: "Investigate JBVM03 logs and ServerStarter restart behaviour."
                runbook_url: "https://github.com/jbannon/homelab-runbooks/blob/main/minecraft-burn-rate.md"

            # SLI is `up{job="pihole"}`, i.e. pihole-exporter scrape success.
            # That measures *exporter* availability, NOT user-facing DNS
            # reachability. The exporter and pihole-FTL :53 are independent
            # paths; the household can resolve DNS perfectly while these
            # alerts fire. Wording reflects that.
            #
            # The real user-DNS SLI (blackbox dns_pihole probe on UDP/53) now
            # exists as `PiholeDnsBurnFast` in the `pihole-dns-real-sli` rules
            # block below; these warning alerts remain as a secondary signal
            # on the exporter→admin-API path.
            - alert: PiholeErrorBudgetBurnFast
              expr: slo:pihole:burn_rate:1h > 14.4 and slo:pihole:burn_rate:5m > 14.4
              for: 2m
              labels: {severity: warning, service: pihole}
              annotations:
                summary: "pihole-exporter scrape failing fast (exporter SLI, not user-facing DNS)"
                host: "JBDNS01 (192.168.0.205)"
                value: "{{ $value | printf \"%.1f\" }}x error-budget burn rate (1h window)"
                threshold: "fast burn >14.4x, sustained 2m"
                impact: "The pihole-exporter to admin-API path is failing. This is NOT the LAN DNS path — household DNS may be perfectly fine."
                action: "Verify real DNS first: `dig @192.168.0.205 +short google.com`. Then check the pihole-exporter pod and the pihole-FTL admin API (port 80) on the LXC."
                runbook_url: "https://github.com/jbannon/homelab-runbooks/blob/main/pihole-burn-rate.md"
            - alert: PiholeErrorBudgetBurnSlow
              expr: slo:pihole:burn_rate:6h > 6 and slo:pihole:burn_rate:30m > 6
              for: 15m
              labels: {severity: warning, service: pihole}
              annotations:
                summary: "pihole-exporter scrape failing slowly (exporter SLI, not user-facing DNS)"
                host: "JBDNS01 (192.168.0.205)"
                value: "{{ $value | printf \"%.1f\" }}x error-budget burn rate (6h window)"
                threshold: "slow burn >6x, sustained 15m"
                impact: "pihole-exporter scrape success has degraded over 6h. Not the LAN DNS path — verify before escalating."
                action: "Check `dig @192.168.0.205 +short google.com` first; if that works, investigate exporter pod restarts or admin-API slowness."
                runbook_url: "https://github.com/jbannon/homelab-runbooks/blob/main/pihole-burn-rate.md"

            - alert: NasErrorBudgetBurnFast
              expr: slo:nas:burn_rate:1h > 14.4 and slo:nas:burn_rate:5m > 14.4
              for: 2m
              labels: {severity: critical, service: nas}
              annotations:
                summary: "NAS unreachable — burning SLO budget fast"
                host: "JBNAS01 (192.168.0.201)"
                value: "{{ $value | printf \"%.1f\" }}x error-budget burn rate (1h window)"
                threshold: "fast burn >14.4x, sustained 2m"
                impact: "node-exporter on JBNAS01 is not responding. SMB shares, Plex media, and weekly rsync backups are all affected."
                action: "Open the Proxmox console on JBSRV01 and check the JBNAS01 VM (VMID 101) — possibly the unclean-shutdown pattern recurring."
                runbook_url: "https://github.com/jbannon/homelab-runbooks/blob/main/nas-burn-rate.md"
            - alert: NasErrorBudgetBurnSlow
              expr: slo:nas:burn_rate:6h > 6 and slo:nas:burn_rate:30m > 6
              for: 15m
              labels: {severity: warning, service: nas}
              annotations:
                summary: "NAS reachability degraded over 6h"
                host: "JBNAS01 (192.168.0.201)"
                value: "{{ $value | printf \"%.1f\" }}x error-budget burn rate (6h window)"
                threshold: "slow burn >6x, sustained 15m"
                impact: "Intermittent NAS scrape failures over 6h; SMB and backup reliability are at risk."
                action: "Check the JBSRV01 to JBNAS01 network path and the TrueNAS dashboard for ZFS pool errors or panic logs."
                runbook_url: "https://github.com/jbannon/homelab-runbooks/blob/main/nas-burn-rate.md"

            - alert: TailscaleNodeBurnFast
              expr: slo:tailscale:burn_rate:1h > 14.4 and slo:tailscale:burn_rate:5m > 14.4
              for: 2m
              labels: {severity: critical, service: tailscale}
              annotations:
                summary: "Tailscale node {{ $labels.hostname }} burning SLO budget fast"
                host: "{{ $labels.hostname }}"
                value: "{{ $value | printf \"%.1f\" }}x error-budget burn rate (1h window)"
                threshold: "fast burn >14.4x, sustained 2m"
                impact: "tailscaled --debug metrics on {{ $labels.hostname }} are not responding; remote access and any subnet routes it advertises are impaired."
                action: "Check the tailscaled service on {{ $labels.hostname }} and the Tailscale admin console."
                runbook_url: "https://github.com/jbannon/homelab-runbooks/blob/main/tailscale-burn-rate.md"
            - alert: TailscaleNodeBurnSlow
              expr: slo:tailscale:burn_rate:6h > 6 and slo:tailscale:burn_rate:30m > 6
              for: 15m
              labels: {severity: warning, service: tailscale}
              annotations:
                summary: "Tailscale node {{ $labels.hostname }} burning SLO budget slowly (>6x for 6h)"
                host: "{{ $labels.hostname }}"
                value: "{{ $value | printf \"%.1f\" }}x error-budget burn rate (6h window)"
                threshold: "slow burn >6x, sustained 15m"
                impact: "Tailscale node {{ $labels.hostname }} has been flapping over 6h — often DERP relay churn or local interface state."
                action: "Check the tailscaled journal and the netstack_dropped_packets metric for {{ $labels.hostname }}."
                runbook_url: "https://github.com/jbannon/homelab-runbooks/blob/main/tailscale-burn-rate.md"

    # SMART drive health. Don't alert on smartctl_exit_status raw — it's a
    # bitfield where bit 6 (=64) means "any historical error log entry", which
    # fires for life on drives that had a single transient read error years
    # ago. Instead: page on the actionable attributes directly, and let the
    # critical SmartDriveStatusFailed catch the manufacturer-threshold flip.
    smart-disk-failures:
      groups:
        - name: smart.disk.alerts
          rules:
            - alert: SmartDriveAttributesBad
              expr: smartctl_device_attribute{attribute_name=~"Reallocated_Sector_Ct|Current_Pending_Sector|Offline_Uncorrectable",attribute_value_type="raw"} > 0
              for: 10m
              labels: {severity: warning, service: storage}
              annotations:
                summary: "SMART attribute {{ $labels.attribute_name }} = {{ $value }} on {{ $labels.device }}"
                host: "JBSRV01 (192.168.0.200)"
                value: "{{ $labels.attribute_name }} raw = {{ $value }}"
                threshold: "any non-zero raw value, sustained 10m"
                impact: "Drive {{ $labels.device }} ({{ $labels.model_name }}) shows real media wear or damage. Left unattended this trends toward drive failure and data loss."
                action: "Run `smartctl -a /dev/{{ $labels.device }}` on JBSRV01 to confirm the trend before planning replacement."
                runbook_url: "https://github.com/jbannon/homelab-runbooks/blob/main/smart-drive-warning.md"
            - alert: SmartSsdLifeLeftLow
              expr: smartctl_device_attribute{attribute_name=~"SSD_Life_Left|Percent_Lifetime_Remain|Media_Wearout_Indicator",attribute_value_type="value"} < 5
              for: 1h
              labels: {severity: warning, service: storage}
              annotations:
                summary: "SSD {{ $labels.device }} wear at {{ $value }}% life remaining"
                host: "JBSRV01 (192.168.0.200)"
                value: "{{ $value }}% life remaining"
                threshold: "below 5% life remaining, sustained 1h"
                impact: "SSD {{ $labels.device }} ({{ $labels.model_name }}) is near end of life. Once it crosses the manufacturer threshold the critical SmartDriveStatusFailed alert fires."
                action: "Plan replacement of {{ $labels.device }} on JBSRV01; identify which pool or VM uses it first."
                runbook_url: "https://github.com/jbannon/homelab-runbooks/blob/main/smart-drive-warning.md"
            - alert: SmartDriveStatusFailed
              expr: smartctl_device_smart_status == 0
              for: 5m
              labels: {severity: critical, service: storage}
              annotations:
                summary: "SMART status FAILED on {{ $labels.device }} ({{ $labels.model_name }}) — drive is dying"
                host: "JBSRV01 (192.168.0.200)"
                value: "SMART overall-health = FAILED"
                threshold: "smart_status reports FAILED, sustained 5m"
                impact: "Drive {{ $labels.device }} has crossed a manufacturer threshold and is expected to fail soon. Data on it is at risk."
                action: "Replace {{ $labels.device }} immediately if it holds data; check which pool or VM uses it first."
                runbook_url: "https://github.com/jbannon/homelab-runbooks/blob/main/smart-drive-failed.md"

    # Filesystem space across the fleet. No instance filter — these evaluate
    # per series, so every node_exporter target (all 6 hosts) is covered with
    # no per-host config. Added 2026-05-20 after JBVM02 silently filled its
    # root disk to 98% with no alert in place.
    #
    # fstype excludes network/remote filesystems (cifs, nfs, nfs4, fuse.*,
    # smb3, 9p): a client host must not page on a server's free space, and
    # client-side SMB/NFS statfs is transiently bogus during session
    # reconnects. The NAS pool's own capacity is still alerted — JBNAS01's
    # node_exporter reports JBNAS_MEDIA as a local filesystem on JBNAS01.
    # Added 2026-05-20 after JBVM01's CIFS /mnt/nas-media phantom-fired both
    # rules (incident 2026-05-20-jbvm01-phantom-nas-media-fs-alert.md).
    node-disk-space:
      groups:
        - name: node.disk.alerts
          rules:
            - alert: NodeFilesystemLow
              expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs|cifs|nfs|nfs4|fuse.*|smb3|9p",mountpoint!~"/(run|boot/efi).*"} / node_filesystem_size_bytes) * 100 < 15
              for: 1h
              labels: {severity: warning, service: storage}
              annotations:
                summary: "{{ $labels.instance }} {{ $labels.mountpoint }} at {{ $value | printf \"%.0f\" }}% free"
                host: "{{ $labels.instance }}"
                value: "{{ $value | printf \"%.1f\" }}% free on {{ $labels.mountpoint }}"
                threshold: "below 15% free, sustained 1h"
                impact: "Filesystem {{ $labels.mountpoint }} is trending toward full. If it fills, writes fail and services on the host can crash."
                action: "Run `df -h` on {{ $labels.instance }}; clear caches and logs or extend the LV."
                runbook_url: "https://github.com/jbannon/homelab-runbooks/blob/main/node-filesystem.md"
            - alert: NodeFilesystemCritical
              expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs|cifs|nfs|nfs4|fuse.*|smb3|9p",mountpoint!~"/(run|boot/efi).*"} / node_filesystem_size_bytes) * 100 < 5
              for: 15m
              labels: {severity: critical, service: storage}
              annotations:
                summary: "{{ $labels.instance }} {{ $labels.mountpoint }} critically full ({{ $value | printf \"%.0f\" }}% free)"
                host: "{{ $labels.instance }}"
                value: "{{ $value | printf \"%.1f\" }}% free on {{ $labels.mountpoint }}"
                threshold: "below 5% free, sustained 15m"
                impact: "Filesystem {{ $labels.mountpoint }} is nearly full — writes will start failing and services may crash on the next disk write."
                action: "Free space now: `df -h {{ $labels.mountpoint }}` on {{ $labels.instance }}, clear caches, or extend the LV."
                runbook_url: "https://github.com/jbannon/homelab-runbooks/blob/main/node-filesystem.md"

    # Host resource pressure across the fleet, measured by kernel PSI (Pressure
    # Stall Information) — the fraction of wall-clock time tasks spend stalled
    # waiting on memory or I/O. PSI is used deliberately instead of a
    # memory-utilisation alert: on this fleet 90%+ RAM use is normal and
    # healthy (ZFS ARC on JBNAS01, the Minecraft JVM heap on JBVM03, guest
    # allocation on the JBSRV01 hypervisor), and a MemAvailable-based alert
    # cannot distinguish that from genuine exhaustion. PSI fires only on real
    # contention. PSI may be absent inside the JBDNS01 LXC — harmless.
    node-resource-pressure:
      groups:
        - name: node.resource.alerts
          rules:
            - alert: NodeMemoryThrottled
              expr: rate(node_pressure_memory_stalled_seconds_total[5m]) > 0.10
              for: 15m
              labels: {severity: warning, service: compute}
              annotations:
                summary: "{{ $labels.instance }} memory-throttled {{ $value | humanizePercentage }} of the time"
                host: "{{ $labels.instance }}"
                value: "{{ $value | humanizePercentage }} of wall-clock time fully stalled on memory"
                threshold: "PSI full-stall rate >10% over 5m, sustained 15m"
                impact: "{{ $labels.instance }} is memory-throttled — tasks are stalling for memory, so the host is slow or unresponsive."
                action: "Check for swap thrashing or a runaway allocation on {{ $labels.instance }} (`free -h`, `ps aux --sort=-%mem`)."
                runbook_url: "https://github.com/jbannon/homelab-runbooks/blob/main/node-resource-pressure.md"
            - alert: NodeIOThrottled
              expr: rate(node_pressure_io_stalled_seconds_total[5m]) > 0.10
              for: 15m
              labels: {severity: warning, service: storage}
              annotations:
                summary: "{{ $labels.instance }} I/O-throttled {{ $value | humanizePercentage }} of the time"
                host: "{{ $labels.instance }}"
                value: "{{ $value | humanizePercentage }} of wall-clock time fully stalled on disk I/O"
                threshold: "PSI full-stall rate >10% over 5m, sustained 15m"
                impact: "{{ $labels.instance }} is I/O-throttled — tasks are stalling on disk, so the host is slow."
                action: "Check `iostat -x` on {{ $labels.instance }} for a saturated device."
                runbook_url: "https://github.com/jbannon/homelab-runbooks/blob/main/node-resource-pressure.md"
            - alert: Jbvm02MaintenanceStale
              expr: time() - maintenance_last_success_timestamp_seconds{name="jbvm02-maintenance"} > 691200
              for: 1h
              labels: {severity: warning, service: platform}
              annotations:
                summary: "JBVM02 weekly disk-hygiene maintenance has not run in over 8 days"
                host: "JBVM02 (192.168.0.203)"
                value: "last successful run {{ $value | humanizeDuration }} ago"
                threshold: "no maintenance success for >8 days"
                impact: "The weekly disk sweep on JBVM02 has stopped; disk hygiene will drift and the root filesystem can fill unnoticed again."
                action: "Check `systemctl status jbvm02-maintenance.timer` on JBVM02."
                runbook_url: "https://github.com/jbannon/homelab-runbooks/blob/main/jbvm02-maintenance.md"

    # ZFS pool health. Excludes boot-pool which is a SOLARIS-style mirror that
    # reports per-vdev state (false-positive on transient resilvers).
    zfs-pool-health:
      groups:
        - name: zfs.pool.alerts
          rules:
            - alert: ZfsPoolNotOnline
              expr: node_zfs_zpool_state{zpool!="boot-pool", state!="online"} == 1
              for: 5m
              labels: {severity: critical, service: storage}
              annotations:
                summary: "ZFS pool {{ $labels.zpool }} on {{ $labels.hostname }} is {{ $labels.state }}"
                host: "{{ $labels.hostname }}"
                value: "pool {{ $labels.zpool }} state = {{ $labels.state }}"
                threshold: "any pool except boot-pool not ONLINE, sustained 5m"
                impact: "Pool {{ $labels.zpool }} is not healthy. JBNAS_MEDIA is a stripe pool — DEGRADED there means data loss is imminent."
                action: "Run `zpool status -v {{ $labels.zpool }}` on {{ $labels.hostname }} to triage."
                runbook_url: "https://github.com/jbannon/homelab-runbooks/blob/main/zfs-pool-degraded.md"

    # Real user-facing Pi-hole DNS SLI via blackbox-exporter (charts/
    # prometheus-blackbox-exporter). SLI is probe_success{job="blackbox-dns-pihole"},
    # which is an actual UDP/53 DNS lookup against 192.168.0.205, distinct
    # from the exporter-scrape SLI `up{job="pihole"}` (kept for the slow-burn
    # warning above). Closes the TODO at the PiholeErrorBudgetBurn comment.
    pihole-dns-real-sli:
      groups:
        - name: pihole-dns.slo.recording
          interval: 1m
          rules:
            # 99.9% SLO target → error budget = 0.001
            - record: slo:pihole_dns:availability:ratio_30d
              expr: avg_over_time(probe_success{job="blackbox-dns-pihole"}[30d])
            - record: slo:pihole_dns:burn_rate:5m
              expr: (1 - avg_over_time(probe_success{job="blackbox-dns-pihole"}[5m])) / 0.001
            - record: slo:pihole_dns:burn_rate:30m
              expr: (1 - avg_over_time(probe_success{job="blackbox-dns-pihole"}[30m])) / 0.001
            - record: slo:pihole_dns:burn_rate:1h
              expr: (1 - avg_over_time(probe_success{job="blackbox-dns-pihole"}[1h])) / 0.001
            - record: slo:pihole_dns:burn_rate:6h
              expr: (1 - avg_over_time(probe_success{job="blackbox-dns-pihole"}[6h])) / 0.001

        - name: pihole-dns.slo.alerts
          rules:
            # Critical: this is the household-impacting signal. Unlike the
            # exporter-based PiholeErrorBudgetBurnFast (warning), failure
            # here means real DNS is broken for every device on the LAN.
            - alert: PiholeDnsBurnFast
              expr: slo:pihole_dns:burn_rate:1h > 14.4 and slo:pihole_dns:burn_rate:5m > 14.4
              for: 2m
              labels: {severity: critical, service: pihole}
              annotations:
                summary: "household DNS unreachable (blackbox dns_pihole probe to 192.168.0.205:53)"
                host: "JBDNS01 (192.168.0.205)"
                value: "{{ $value | printf \"%.1f\" }}x error-budget burn rate (1h window)"
                threshold: "fast burn >14.4x, sustained 2m"
                impact: "Real user-facing DNS is failing — every device on the LAN cannot resolve names. This is the household-impacting signal, independent of the pihole-exporter scrape."
                action: "1) `dig @192.168.0.205 +short google.com` from another host; 2) `systemctl status pihole-FTL` on JBDNS01; 3) check upstream resolvers in the Pi-hole admin UI; 4) verify JBDNS01 networking."
                runbook_url: "https://github.com/jbannon/homelab-runbooks/blob/main/pihole-burn-rate.md"

    # Loki / Promtail health. Both are scraped via ServiceMonitor enabled in
    # charts/loki/values.yaml and charts/promtail/values.yaml. Without these
    # alerts a silent log-ingestion failure would leave dashboards quietly
    # blank.
    logging-stack-health:
      groups:
        - name: logging.alerts
          rules:
            - alert: LokiDown
              expr: up{job="loki"} == 0
              for: 5m
              labels: {severity: warning, service: loki}
              annotations:
                summary: "Loki is down — log ingestion stopped"
                host: "JBK8S01 (192.168.0.207)"
                value: "Loki scrape failing (up = 0)"
                threshold: "up{job=loki} == 0, sustained 5m"
                impact: "Log ingestion has stopped. Log dashboards go blank and Promtail buffers until disk pressure builds."
                action: "Check `kubectl -n monitoring describe pod -l app.kubernetes.io/name=loki` and the loki PVC."
                runbook_url: "https://github.com/jbannon/homelab-runbooks/blob/main/loki-down.md"
            - alert: PromtailDown
              expr: up{job="promtail"} == 0
              for: 5m
              labels: {severity: warning, service: promtail}
              annotations:
                summary: "Promtail down on {{ $labels.instance }} — journal not shipping to Loki"
                host: "{{ $labels.instance }}"
                value: "Promtail scrape failing (up = 0)"
                threshold: "up{job=promtail} == 0, sustained 5m"
                impact: "Journal entries from {{ $labels.instance }} are no longer reaching Loki — that host's logs go dark."
                action: "Check the promtail pod on {{ $labels.instance }} and its position file under /run/promtail/."
                runbook_url: "https://github.com/jbannon/homelab-runbooks/blob/main/promtail-down.md"

    # Clock sync. node_timex_sync_status == 1 means the kernel clock is
    # disciplined by NTP; 0 means it is free-running and drifting. Replaces the
    # upstream NodeClockNotSynchronising alert lost when nodeExporterAlerting
    # was culled. min_over_time guards against a single transient scrape.
    node-clock-sync:
      groups:
        - name: node.clock.alerts
          rules:
            - alert: NodeClockSkew
              expr: min_over_time(node_timex_sync_status[5m]) == 0
              for: 10m
              labels: {severity: warning, service: compute}
              annotations:
                summary: "{{ $labels.instance }} clock is not synchronised to NTP"
                host: "{{ $labels.instance }}"
                value: "node_timex_sync_status = 0 (clock free-running)"
                threshold: "sync_status == 0, sustained 10m"
                impact: "The host clock on {{ $labels.instance }} is drifting. Skewed timestamps corrupt log correlation, TLS validation, and backup-age tiles."
                action: "Check `timedatectl status` and the chrony/systemd-timesyncd service on {{ $labels.instance }}."
                runbook_url: "https://github.com/jbannon/homelab-runbooks/blob/main/node-clock-skew.md"
