# ServiceAccount used by the NAS media-integrity pipeline (dropbox-mover.sh on
# JBNAS01) to launch ffmpeg decode-scan Jobs in the monitoring namespace.
# Least-privilege: see role.yaml. The kubeconfig built from this SA's token is
# deployed manually to the NAS at /root/.kube/config (mode 600); it is NOT a
# cluster object and is deliberately kept out of git.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: media-scanner
  namespace: monitoring
  labels:
    app.kubernetes.io/name: media-scanner
    app.kubernetes.io/part-of: media-integrity-pipeline
---
# A non-expiring token Secret for the SA (k8s 1.24+ no longer auto-creates one).
# Consumed by the NAS kubeconfig. Namespace-scoped: even if leaked it can only
# act within the monitoring namespace per the Role below.
apiVersion: v1
kind: Secret
metadata:
  name: media-scanner-token
  namespace: monitoring
  annotations:
    kubernetes.io/service-account.name: media-scanner
  labels:
    app.kubernetes.io/name: media-scanner
    app.kubernetes.io/part-of: media-integrity-pipeline
type: kubernetes.io/service-account-token
