apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole-exporter
  namespace: monitoring
  labels:
    app: pihole-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pihole-exporter
  template:
    metadata:
      labels:
        app: pihole-exporter
    spec:
      containers:
        - name: pihole-exporter
          image: ekofr/pihole-exporter:v1.2.0
          ports:
            - containerPort: 9617
          env:
            - name: PIHOLE_HOSTNAME
              value: "192.168.0.205"
            - name: PIHOLE_PROTOCOL
              value: "http"
            - name: PIHOLE_PORT
              value: "80"
            - name: PORT
              value: "9617"
            - name: PIHOLE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pihole-exporter-config
                  key: password
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
