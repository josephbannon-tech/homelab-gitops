apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: plex-exporter
  namespace: monitoring
  labels:
    app: plex-exporter
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: plex-exporter
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
      relabelings:
        # Force job label to "plex" — see pihole-exporter/servicemonitor.yaml
        # for rationale (preserves existing recording rules + dashboards).
        - targetLabel: job
          replacement: plex
        - targetLabel: hostname
          replacement: NvidiaShield
        - targetLabel: role
          replacement: media-server
