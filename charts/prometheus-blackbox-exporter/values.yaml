prometheus-blackbox-exporter:
  # Modules: how blackbox probes a target. Probe CRDs in templates/ bind a
  # module to a target:
  #   * dns_pihole  -> 192.168.0.205:53/udp  -> probe_success{job="blackbox-dns-pihole"}
  #                    (SLI behind PiholeDnsBurnFast)
  #   * http_plex   -> 192.168.0.202:32400/identity -> probe_success{job="blackbox-plex"}
  #                    (SLI behind PlexReachabilityBurnFast)
  config:
    modules:
      dns_pihole:
        prober: dns
        timeout: 5s
        dns:
          transport_protocol: udp
          preferred_ip_protocol: ip4
          # Resolve a real public domain — this exercises the full path
          # (pihole-FTL + upstream forwarding). The earlier health.check.local
          # had no DNS record, so Pi-hole returned NXDOMAIN and the probe
          # failed permanently, making the SLI read 0%.
          query_name: google.com
          query_type: A
          valid_rcodes: [NOERROR]
      http_plex:
        prober: http
        timeout: 5s
        http:
          method: GET
          preferred_ip_protocol: ip4
          valid_status_codes: [200]
          # /identity is the Plex Media Server health endpoint: unauthenticated,
          # returns a tiny XML MediaContainer instantly, and crucially does NOT
          # touch the library DB or session store. That decouples this SLI from
          # PMS load — unlike the plex-exporter /metrics scrape, which queries
          # the Plex API for library+session stats and times out under playback
          # load (the false-alarm pattern that fired PlexErrorBudgetBurnFast).
          fail_if_body_not_matches_regexp:
            - "machineIdentifier"

  # ServiceMonitor configuration:
  #   * The chart's `serviceMonitor.targets` mechanism (target-style SMs) is
  #     deprecated; we use a Probe CRD instead. Leave this disabled.
  #   * `selfMonitor` scrapes blackbox's own /metrics so the exporter itself
  #     shows up in `up{job=~"prometheus-blackbox-exporter"}`.
  serviceMonitor:
    enabled: false
    selfMonitor:
      enabled: true
      labels:
        release: kube-prometheus-stack

  # Pod-level seccomp: not set by upstream defaults; add RuntimeDefault to
  # match the hardening pattern used by pihole-exporter / plex-exporter.
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534

  # Container security context. Upstream defaults are already mostly fine
  # (readOnlyRootFilesystem, runAsNonRoot, drop ALL); we tighten user/group
  # to nobody (65534) to be consistent with the other exporters.
  securityContext:
    runAsUser: 65534
    runAsGroup: 65534
    runAsNonRoot: true
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]

  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 64Mi

  replicas: 1
